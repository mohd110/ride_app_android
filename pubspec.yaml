name: riderapp
description: Rider Connect App - Hybrid Mobile and Web Simulator.
version: 4.7.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.15.0
  geolocator: ^14.0.3
  flutter_local_notifications: ^22.0.1
  audioplayers: ^6.8.0
  url_launcher: ^6.3.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  image_picker: ^1.2.2
  flutter_foreground_task: ^8.14.0
  shared_preferences: ^2.3.2
  flutter_overlay_window: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/rider_profile.png
    - assets/images/customer_avatar.png
    - assets/images/delivery_proof.png
    - assets/sounds/new_order_alert.ogg
